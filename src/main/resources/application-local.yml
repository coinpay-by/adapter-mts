server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5439/adapter-mts
    username: admin
    password: admin
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none

springdoc:
  swagger-ui:
    enabled: true

logging:
  pattern:
    # убираем поле трассировки [traceId-spanId] из консоли — в локали оно пустует и создаёт большие пробелы
    correlation: ""

mts-adapter:
  rest:
    coinpay-rate:
      url: 'http://localhost:8080'
    coinpay-transfer:
      url: 'http://localhost:8080'

  params:
    coinpay-rate:
      token: 'auth_token_coinpay'
      mts-partner-id: 12345

    rate:
      hard-rate-enable: false
      hard-rate-value: 0.3
      lower-bound: 0.034
      upper-bound: 0.0395

    coinpay-transfer:
      terminal-id: '3b9aa1d4-7c2e-4d1a-9f3b-5e8c1a2d6f80'
      secret: 'local_dev_secret'

  jobs:
    # отмена переводов, зависших в статусе CREATED дольше TTL (30 мин по спеке MT)
    cancel-expired-transfers:
      cron: 0 */30 * * * *   # каждые 30 минут
    # отправка PROCESSING-переводов в CoinPay Transfer API
    send-transfers:
      cron: "*/15 * * * * *"   # каждые 15 секунд
    # опрос статусов отправленных переводов
    check-transfers-status:
      cron: "*/30 * * * * *"   # каждые 30 секунд
